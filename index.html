<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg: #f5f2eb;
      --bg2: #ede9e0;
      --ink: #1a1714;
      --ink2: #6b6560;
      --ink3: #a09a93;
      --gold: #b5831a;
      --gold-light: rgba(181,131,26,0.12);
      --rule: #d8d2c7;
      --serif: 'Playfair Display', Georgia, serif;
      --mono: 'DM Mono', 'Courier New', monospace;
    }
 
    html { scroll-behavior: smooth; }
 
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--serif);
      min-height: 100vh;
      overflow-x: hidden;
    }
 
    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.5;
    }
 
    /* ── HEADER ── */
    header {
      padding: 72px 0 48px;
      border-bottom: 1px solid var(--rule);
      position: relative;
      overflow: hidden;
    }
 
    header::after {
      content: 'READ';
      position: absolute;
      right: -20px;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--serif);
      font-size: 160px;
      font-weight: 500;
      color: var(--rule);
      letter-spacing: -8px;
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }
 
    .container { max-width: 780px; margin: 0 auto; padding: 0 40px; }
 
    .eyebrow {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
      display: block;
    }
 
    h1 {
      font-size: clamp(42px, 6vw, 72px);
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
 
    h1 em {
      font-style: italic;
      color: var(--gold);
    }
 
    .subtitle {
      margin-top: 20px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink3);
      letter-spacing: 0.05em;
    }
 
    /* ── FILTERS ── */
    .filters {
      padding: 24px 0;
      border-bottom: 1px solid var(--rule);
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
 
    .filter-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-right: 6px;
    }
 
    .tag-btn {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 12px;
      border: 1px solid var(--rule);
      background: transparent;
      color: var(--ink2);
      cursor: pointer;
      border-radius: 1px;
      transition: all 0.15s ease;
    }
 
    .tag-btn:hover { border-color: var(--gold); color: var(--gold); }
    .tag-btn.active { background: var(--gold-light); border-color: var(--gold); color: var(--gold); }
 
    /* ── ARTICLE LIST ── */
    .articles { padding: 0; }
 
    .article {
      border-bottom: 1px solid var(--rule);
      padding: 44px 0;
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 0 20px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.4s ease forwards;
    }
 
    .article.hidden { display: none; }
 
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
 
    .article:nth-child(1) { animation-delay: 0.05s; }
    .article:nth-child(2) { animation-delay: 0.1s; }
    .article:nth-child(3) { animation-delay: 0.15s; }
    .article:nth-child(4) { animation-delay: 0.2s; }
    .article:nth-child(5) { animation-delay: 0.25s; }
 
    .article-num {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--gold);
      padding-top: 6px;
      text-align: right;
    }
 
    .article-body {}
 
    .article-meta {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 10px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
 
    .article-meta span + span::before {
      content: '·';
      margin-right: 12px;
    }
 
    .article-title {
      font-size: clamp(20px, 2.8vw, 26px);
      font-weight: 400;
      line-height: 1.25;
      letter-spacing: -0.01em;
      color: var(--ink);
      text-decoration: none;
      display: block;
      margin-bottom: 14px;
      transition: color 0.15s ease;
    }
 
    .article-title:hover { color: var(--gold); }
 
    .article-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
 
    .article-tag {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border: 1px solid var(--rule);
      color: var(--ink3);
      border-radius: 1px;
    }
 
    .insights-btn {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink3);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.15s;
    }
 
    .insights-btn:hover { color: var(--gold); }
 
    .insights-btn .arrow {
      display: inline-block;
      transition: transform 0.2s ease;
      font-size: 8px;
    }
 
    .insights-btn.open .arrow { transform: rotate(90deg); }
 
    .insights-panel {
      margin-top: 20px;
      padding: 20px 24px;
      background: var(--bg2);
      border-left: 2px solid var(--gold);
      font-size: 15px;
      line-height: 1.8;
      color: var(--ink2);
      font-style: italic;
      display: none;
    }
 
    .insights-panel.open { display: block; }
 
    /* ── FOOTER ── */
    footer {
      padding: 48px 0;
      border-top: 1px solid var(--rule);
      margin-top: 40px;
    }
 
    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
 
    .footer-text {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--ink3);
      text-transform: uppercase;
    }
 
    .footer-count {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--gold);
      text-transform: uppercase;
    }
 
    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .container { padding: 0 24px; }
      header { padding: 48px 0 36px; }
      header::after { font-size: 80px; }
      .article { grid-template-columns: 36px 1fr; gap: 0 12px; padding: 32px 0; }
    }
  </style>
</head>
<body>
 
  <header>
    <div class="container">
      <span class="eyebrow">Neel's Curated Intelligence</span>
      <h1>Reading <em>List</em></h1>
      <p class="subtitle">Articles worth your attention — summaries included</p>
    </div>
  </header>
 
  <div class="container">
 
    <div class="filters" id="filters">
      <span class="filter-label">Filter</span>
    </div>
 
    <div class="articles" id="articles"></div>
 
  </div>
 
  <footer>
    <div class="container">
      <div class="footer-inner">
        <span class="footer-text">Updated via Claude</span>
        <span class="footer-count" id="footer-count"></span>
      </div>
    </div>
  </footer>
 
  <script>
    const articles = [
      {
        id: 1,
        title: "How to Manage the Risk of AI Agents",
        url: "https://www.sectionai.com/blog/how-to-manage-the-risk-of-ai-agents",
        source: "sectionai.com",
        author: "Michael Domanic",
        date: "2026-05-16",
        tags: ["agents", "risk", "agentic AI"],
        summary: "A practical framework for deciding what's safe to automate using two variables: blast radius (how much damage a failure could cause) and reversibility (how easily mistakes can be undone). Maps to a 2×2 ranging from 'automate freely' for low-risk reversible tasks to 'require human oversight' for high-stakes irreversible ones. The key takeaway: start with cheap mistakes to build organizational judgment before scaling to higher-stakes deployments."
      },
      {
        id: 2,
        title: "Anthropic Education Report: The AI Fluency Index",
        url: "https://www.anthropic.com/research/AI-fluency-index",
        source: "anthropic.com",
        author: "Kristen Swanson et al.",
        date: "2026-05-16",
        tags: ["AI fluency", "research", "enterprise adoption"],
        summary: "Anthropic's first empirical baseline on how people actually collaborate with AI, drawn from ~10K Claude.ai conversations. Key finding: iteration and refinement is the single strongest signal of fluency — those conversations show 2x more fluency behaviors overall and are 5.6x more likely to include users questioning Claude's reasoning. Counterintuitively, when AI produces polished artifacts, users become more directive but less evaluative — fact-checking and reasoning scrutiny actually drops. Three practical takeaways: stay in the conversation, question polished outputs, and set explicit collaboration terms upfront."
      },
      {
        id: 3,
        title: "How to Measure Your AI Fluency—and Move to the Next Level",
        url: "https://zapier.com/blog/ai-fluency/",
        source: "zapier.com",
        author: "Jessica Lau",
        date: "2026-05-16",
        tags: ["AI fluency", "professional development", "frameworks"],
        summary: "Zapier's internal AI fluency rubric, made public, with four levels: Unacceptable (avoidance/skepticism), Capable (intentional but limited use), Adoptive (regular, repeatable AI use with measurable impact), and Transformative (AI-first thinking that scales across teams). The framework is practical rather than technical — it focuses on habits, mindset, and judgment rather than tool proficiency. The key progression insight: aim one level up at a time with a single repeatable behavioral change, not a wholesale transformation."
      },
      {
        id: 4,
        title: "The Inverted Stack",
        url: "https://medium.com/@saneshashank/the-inverted-stack-fc2ba67e2e77",
        source: "medium.com",
        author: "Shashank Sane",
        date: "2026-05-17",
        tags: ["economics", "AI strategy", "value chain"],
        summary: "An economics-first analysis of the AI super cycle, prompted by Yann LeCun's observation that AI's impact on labor and markets is 'an economics problem, not a technology problem.' The central argument: the AI value chain has its own distinct economics that break inherited mental models from the cloud era. The 'inverted stack' framing suggests value accrues upward toward infrastructure (chips, compute) rather than down to applications, which face commoditization pressure — inverting the prior cycle where software captured most value."
      }
    ];
 
    // Build tag set
    const allTags = ["all", ...new Set(articles.flatMap(a => a.tags))];
    let activeFilter = "all";
 
    // Render filters
    const filtersEl = document.getElementById("filters");
    allTags.forEach(tag => {
      const btn = document.createElement("button");
      btn.className = "tag-btn" + (tag === "all" ? " active" : "");
      btn.textContent = tag;
      btn.addEventListener("click", () => {
        activeFilter = tag;
        document.querySelectorAll(".tag-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        filterArticles();
      });
      filtersEl.appendChild(btn);
    });
 
    // Render articles
    const articlesEl = document.getElementById("articles");
    articles.forEach((article, i) => {
      const el = document.createElement("div");
      el.className = "article";
      el.dataset.tags = article.tags.join(",");
      el.innerHTML = `
        <div class="article-num">${String(i + 1).padStart(2, "0")}.</div>
        <div class="article-body">
          <div class="article-meta">
            <span>${article.source}</span>
            <span>${article.author}</span>
            <span>${article.date}</span>
          </div>
          <a class="article-title" href="${article.url}" target="_blank" rel="noopener noreferrer">${article.title}</a>
          <div class="article-tags">
            ${article.tags.map(t => `<span class="article-tag">${t}</span>`).join("")}
          </div>
          <button class="insights-btn" onclick="toggleInsights(this)">
            <span class="arrow">▶</span> Key insights
          </button>
          <div class="insights-panel">${article.summary}</div>
        </div>
      `;
      articlesEl.appendChild(el);
    });
 
    // Footer count
    document.getElementById("footer-count").textContent = `${articles.length} articles`;
 
    function toggleInsights(btn) {
      const panel = btn.nextElementSibling;
      const isOpen = panel.classList.contains("open");
      btn.classList.toggle("open", !isOpen);
      btn.querySelector(".arrow").style.transform = isOpen ? "" : "rotate(90deg)";
      btn.innerHTML = isOpen
        ? `<span class="arrow">▶</span> Key insights`
        : `<span class="arrow" style="transform:rotate(90deg)">▶</span> Hide insights`;
      panel.classList.toggle("open", !isOpen);
    }
 
    function filterArticles() {
      document.querySelectorAll(".article").forEach(el => {
        const tags = el.dataset.tags.split(",");
        el.classList.toggle("hidden", activeFilter !== "all" && !tags.includes(activeFilter));
      });
    }
  </script>
 
</body>
</html>
